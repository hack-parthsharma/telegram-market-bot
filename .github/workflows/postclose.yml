name: Post-Close Digest

on:
  schedule:
    # 15:45 IST (post market close) = 10:15 UTC, Mon-Fri
    - cron: "15 10 * * 1-5"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run post-close digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODELS: ${{ vars.OPENROUTER_MODELS }}
        run: python run.py postclose
