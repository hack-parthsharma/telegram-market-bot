name: Market News

on:
  schedule:
    # Every 30 minutes, around the clock — pushes only headlines not seen before.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# Avoid overlapping runs stepping on the shared state.
concurrency:
  group: market-news
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      # Persist the "already-sent" list between runs so only fresh news goes out.
      # A unique key per run always saves; restore-keys pulls the most recent prior state.
      - name: Restore news state
        uses: actions/cache@v4
        with:
          path: .state
          key: news-state-${{ github.run_id }}
          restore-keys: |
            news-state-

      - name: Send fresh market news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_STATE_DIR: .state
        run: python run.py news
